<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Future Landing</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

font-family:
"Inter",
"Microsoft YaHei",
sans-serif;

background:#050505;

color:white;

}



.hero{

position:relative;

height:100vh;

overflow:hidden;


background:

radial-gradient(
circle at center,
#17233d,
#050505 70%
);

}



canvas{

position:absolute;

inset:0;

}




/* 鼠标光晕 */


.spot{

position:absolute;

width:500px;

height:500px;

border-radius:50%;


pointer-events:none;


background:

radial-gradient(

circle,

rgba(0,245,255,.22),

rgba(139,92,246,.15) 35%,

transparent 70%

);


filter:blur(30px);


transform:
translate(-50%,-50%);


}




/* 导航 */


.nav{


position:absolute;

top:40px;

left:50%;

transform:translateX(-50%);


width:90%;


padding:18px 30px;


display:flex;

justify-content:space-between;


border-radius:20px;


background:

rgba(255,255,255,.06);


backdrop-filter:blur(20px);


border:

1px solid rgba(255,255,255,.1);

}


.logo{

font-size:22px;

font-weight:800;

letter-spacing:3px;

}



.nav span{

color:#999;

}




/* 内容 */


.content{


position:absolute;


top:50%;

left:50%;


transform:

translate(-50%,-50%);


text-align:center;


width:90%;

}




h1{


font-size:

clamp(50px,8vw,100px);


font-weight:900;


letter-spacing:-5px;


cursor:pointer;


transition:.5s;


}


/* 鼠标经过字体 */


h1:hover{


transform:

scale(1.05);


text-shadow:

0 0 40px rgba(0,245,255,.5);


}



h1:hover .word{


background:

linear-gradient(

90deg,

#fff,

#00f5ff,

#8b5cf6,

#ec4899

);


-webkit-background-clip:text;

color:transparent;


}



/* 文字 */


.word{


display:inline-block;


transition:

.5s cubic-bezier(.2,1,.3,1);


}



.highlight{


position:relative;

z-index:1;


}



.highlight::after{


content:"";


position:absolute;


left:-5%;


bottom:8px;


height:30%;


width:110%;


z-index:-1;



background:

linear-gradient(

90deg,

#00f5ff,

#8b5cf6,

#ec4899

);


border-radius:30px;



filter:

blur(5px);



animation:

shine 3s infinite;



}



@keyframes shine{


0%,100%{

opacity:.6;

transform:
translateX(-10%);

}


50%{

opacity:1;

transform:
translateX(10%);

}

}




.subtitle{


margin-top:35px;


font-size:20px;


color:#aeb5c8;


line-height:2;



}



.buttons{


margin-top:45px;

display:flex;

justify-content:center;

gap:25px;

}



button{


padding:

18px 40px;


border-radius:50px;


font-size:16px;


cursor:pointer;


transition:.4s;


}



.primary{


border:none;


color:white;


background:

linear-gradient(

90deg,

#00f5ff,

#8b5cf6

);



box-shadow:

0 0 40px rgba(0,245,255,.5);


}



.secondary{


color:white;


background:

rgba(255,255,255,.05);


border:

1px solid rgba(255,255,255,.2);


}




button:hover{


transform:

translateY(-8px)

rotateX(10deg);


}





</style>

</head>



<body>


<section class="hero">


<canvas id="canvas"></canvas>


<div class="spot"></div>



<div class="nav">


<div class="logo">

NOVA

</div>


<span>

Future Experience

</span>


</div>



<div class="content">


<h1 id="title">


<span class="word">

探索下一代

</span>


<span class="highlight word">

智能体验

</span>


</h1>



<p class="subtitle">

未来科技与商业体验融合，
打造下一代数字产品入口。

</p>



<div class="buttons">


<button class="primary">

开始探索

</button>


<button class="secondary">

查看产品

</button>


</div>


</div>


</section>




<script>



const canvas =
document.querySelector("#canvas");


const ctx =
canvas.getContext("2d");



let w,h;


function resize(){


w=

canvas.width=

innerWidth;


h=

canvas.height=

innerHeight;


}


resize();


window.onresize=resize;



let mouse={

x:-1000,

y:-1000

};



let spot=
document.querySelector(".spot");



document.onmousemove=e=>{


mouse.x=e.clientX;

mouse.y=e.clientY;



spot.style.left=
mouse.x+"px";


spot.style.top=
mouse.y+"px";



magneticTitle(e);



};





/* =====================
点阵
===================== */


let dots=[];


function init(){


dots=[];


for(
let y=0;
y<h;
y+=35
){


for(
let x=0;
x<w;
x+=35
){


dots.push({

x,

y,

base:1.5

});


}


}

}



init();



function animate(){



ctx.clearRect(
0,
0,
w,
h
);



dots.forEach(d=>{


let dx=
mouse.x-d.x;


let dy=
mouse.y-d.y;



let dis=
Math.sqrt(
dx*dx+dy*dy
);



let power=

Math.max(
0,
1-dis/250
);



let move=

power*12;



let x=

d.x-

dx/dis*move;


let y=

d.y-

dy/dis*move;



ctx.beginPath();



ctx.arc(

x,

y,

d.base+
power*3,

0,

Math.PI*2

);



ctx.fillStyle=

`

rgba(
0,
245,
255,
${0.15+power}
)

`;



ctx.fill();



});



requestAnimationFrame(animate);


}



animate();





/* =====================
标题磁吸效果
===================== */


const title=
document.querySelector("#title");



function magneticTitle(e){


let rect=
title.getBoundingClientRect();



let centerX=
rect.left+
rect.width/2;


let centerY=
rect.top+
rect.height/2;



let dx=
(e.clientX-centerX)/20;


let dy=
(e.clientY-centerY)/20;



title.style.transform=

`

translate(
${dx}px,
${dy}px
)

`;



}




/* 鼠标离开恢复 */


document.body.onmouseleave=()=>{


title.style.transform="translate(0,0)";


};




</script>


</body>
</html>
